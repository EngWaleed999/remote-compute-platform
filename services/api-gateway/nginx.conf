worker_processes auto;

events {
    # Default: 1024. This defines how many connections a worker process can open at once.
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    # --------------------------------------------------------------------------
    # Best Practice: Preserve Real IP and Standardize Headers
    # --------------------------------------------------------------------------
    # When NGINX proxies a request to a container, the container normally sees 
    # the IP of the NGINX container instead of the actual user's IP.
    # We pass these headers so the backend services know the real origin.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # -------------------------------------------
    # Rate limit
    # limit_req_zone -> تخبره اريدك ان تحجز مساحه في الذاكرة لكي نراقب ونعد الطلبات المستخدمين هذا السطر سؤسس القاعدة والرام 
    # $binary_remote_addr -> هذا المراقب / من نراقب هنا نحدد على اي اساس سنقوم بالعد
    # نريد ان نعد الطلبات عن طريق IP الخاص بالمستخدم
    # $binary_remote_addr اخترناه لانه يقوم بضغطه كثنائي لكي يكون حجمه اصغر ويتحمل ملايين الطلبات بدون ان ينهار 
    # remote_addr -> يقوم بتخزينه ك نص 
    # zone=globalLimiter =>  تسمية اسم  المنطقه التي نريد ان نحفظها
    # :10m -> كم نحجز مساحه في الذاكرة 10 ميجا 
    # Nginx -> يقول نقدر نخزن في 1 ميجا 16.000 عنوان اي بي 
    # rate=100r/m -> عدد الطلبات هنا خليناها بالدقيقه
    limit_req_zone $binary_remote_addr zone=globalLimiter:10m rate=100r/m

    limit_req_zone $binary_remote_addr zone=standardLimiter:10m rate=30r/m

    limit_req_zone $binary_remote_addr zone=authLimiter:10m rate=20r/m

    limit_req_zone $binary_remote_addr zone=sensitiveLimiter:10m rate=5/m
    # -------------------------------------------

    server {
        listen 80;

        limit_req_zone zone=globalLimiter burset=10 nodelay

        # ----------------------------------------------------------------------
        # 1. Public Routes (No Authentication Required)
        # ----------------------------------------------------------------------
        
        # The Authentication endpoints (login, register, refresh) must be public.
        # We route these directly to the user_service container on port 3001.
        location /api/v1/auth/ {
            limit_req_zone zone=globalLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/register {
            limit_req_zone zone=authLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/login {
            limit_req_zone zone=authLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/refresh {
            limit_req_zone zone=standardLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/logout {
            limit_req_zone zone=standardLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/restore/request {
            limit_req_zone zone=sensitiveLimiter
            proxy_pass http://user-service:3001;
        }

        location /api/v1/auth/restore/confirm {
            limit_req_zone zone=sensitiveLimiter
            proxy_pass http://user-service:3001;
        }



        # ----------------------------------------------------------------------
        # 2. Internal Sub-request for Authentication (auth_request)
        # ----------------------------------------------------------------------
        
        # This route is 'internal', meaning it cannot be accessed directly by users.
        # It is triggered internally by NGINX for protected routes.
        location = /auth-verify {
            internal;
            
            # Forward the request to an endpoint that verifies the token.
            proxy_pass http://user-service:3001/api/v1/auth/verify;
            
            # Do not pass the original request body to the auth endpoint (we only need the headers like cookies/authorization).
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            
            # Pass the original URI to the backend so it knows what was being requested if needed.
            proxy_set_header X-Original-URI $request_uri;
        }

        # ----------------------------------------------------------------------
        # 3. Protected Routes (Require Authentication)
        # ----------------------------------------------------------------------
        
        # User Service routes (e.g. profile management)
        location /api/v1/users/ {
            # This directive halts the request and fires a sub-request to /auth-verify.
            # If /auth-verify returns 200, NGINX continues to the proxy_pass.
            # If it returns 401/403, NGINX immediately returns that error to the client.
            auth_request /auth-verify;
            proxy_pass http://user-service:3001;
        }

        # Machine Service routes
        # location /api/v1/machines/ {
        #    auth_request /auth-verify;
            
            # Assuming machine_service will be added to docker-compose and runs on port 3002
        #    proxy_pass http://machine_service:3002/api/v1/machines/;
        #}

        # Booking Service routes
        # location /api/v1/bookings/ {
          #  auth_request /auth-verify;
           # proxy_pass http://booking-service:3003/api/v1/bookings/;
        # }
        
        # Payment Service routes
        # location /api/v1/payments/ {
          #  auth_request /auth-verify;
           # proxy_pass http://payment-service:3004/api/v1/payments/;
        #}
    }
}