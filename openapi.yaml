openapi: 3.0.3
info:
  title: System API Documentation
  description: توثيق شامل لواجهات برمجة التطبيقات (APIs) المختلفة المتاحة ضمن النظام.
  version: 1.0.0
servers:
  - url: https://api.yourplatform.com/v1
    description: Main Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Unauthorized access"
        message:
          type: string
          example: "Invalid token"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        machineId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, active, completed, cancelled]

    Machine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [available, in_use, maintenance, offline]
        specs:
          type: object

security:
  - bearerAuth: []

paths:
  # ==========================================
  # 1️⃣ USER SERVICE
  # ==========================================
  /auth/register:
    post:
      summary: تسجيل مستخدم جديد
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                name:
                  type: string
      responses:
        "201":
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: تسجيل دخول
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        "401":
          description: Unauthorized

  /users/me:
    get:
      summary: بياناتي
      tags:
        - Users
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      summary: تحديث بياناتي
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      summary: حذف حسابي
      tags:
        - Users
      responses:
        "204":
          description: Deleted successfully

  # ==========================================
  # 2️⃣ BOOKING SERVICE
  # ==========================================
  /bookings:
    get:
      summary: حجوزاتي (مع Pagination)
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      summary: إنشاء حجز جديد
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machineId, startTime, durationHours]
              properties:
                machineId:
                  type: string
                startTime:
                  type: string
                  format: date-time
                durationHours:
                  type: integer
                  minimum: 1
                  maximum: 24
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      summary: تفاصيل حجز
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

  /bookings/{id}/cancel:
    patch:
      summary: إلغاء حجز
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ==========================================
  # 3️⃣ MACHINE SERVICE
  # ==========================================
  /machines:
    get:
      summary: قائمة الأجهزة المتاحة للعامة
      tags:
        - Machines
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      summary: تسجيل جهاز جديد (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, specs]
              properties:
                name:
                  type: string
                specs:
                  type: object
      responses:
        "201":
          description: Machine registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"

  /machines/{id}:
    get:
      summary: تفاصيل جهاز
      tags:
        - Machines
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Machine details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
    patch:
      summary: تحديث جهاز (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        "200":
          description: Machine updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
    delete:
      summary: حذف جهاز (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Machine deleted
