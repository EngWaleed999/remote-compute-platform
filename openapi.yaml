openapi: 3.0.3
info:
  title: remote-compute-platform
  description: توثيق شامل لواجهات برمجة التطبيقات (APIs) المختلفة المتاحة ضمن النظام.
  version: 1.0.0
servers:
  - url: https://api.yourplatform.com/v1
    description: Main Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: 'Unauthorized access'
        message:
          type: string
          example: 'Invalid token'

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT token صالح لـ 15 دقيقة
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        refreshToken:
          type: string
          description: JWT token صالح لـ 7 أيام
          example: 'dGhpcyBpcyBhIHJlZnJlc2g...'
        user:
          $ref: '#/components/schemas/User'
    GoneError:
      type: object
      properties:
        error:
          type: string
          example: 'Grace period expired'
        code:
          type: string
          example: 'ACCOUNT_PERMANENTLY_DELETED'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: التوكن الطويل الأمد (Refresh Token)

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        machineId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, active, completed, cancelled]

    Machine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [available, in_use, maintenance, offline]
        specs:
          type: object

security:
  - bearerAuth: []

paths:
  # ==========================================
  # 1️⃣ USER SERVICE
  # ==========================================
  /auth/register:
    post:
      summary: تسجيل مستخدم جديد
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                name:
                  type: string
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: تسجيل دخول
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized

  /auth/restore/request:
    post:
      tags:
        - Account Recovery
      summary: طلب استعادة الحساب
      description: |
        حاليا يدخل الايميل للاستعادة نشاط الحساب مستقبلا يمكن اضافه ميزه
        يرسل كود تحقق إلى بريد المستخدم المسجل.
        يعمل فقط إذا كان الحساب في فترة السماح (30 يوم).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: 'user@example.com'
      responses:
        '200':
          description: تم إرسال الكود (أو إرجاعه في Development)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Restore code sent to your email'
                  expiresIn:
                    type: string
                    example: '10m'
                  devCode: # ← يُعرض فقط في Development
                    type: string
                    example: 'A1B2C3'

        '404':
          description: لا يوجد حساب محذوف بهذا الإيميل
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: انتهت فترة السماح (Grace Period Expired)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'

  /auth/restore/confirm:
    post:
      tags:
        - Account Recovery
      summary: تأكيد استعادة الحساب
      description: |
        يستلم كود التحقق وكلمة المرور الجديدة.
        يستعيد الحساب (soft-delete → active) ويسجل دخول تلقائياً.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, newPassword]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                newPassword:
                  type: string
                  minLength: 8
                  format: password
      responses:
        '200':
          description: تم الاستعادة وإعادة تسجيل الدخول
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: 'Account restored successfully'
        '400':
          description: كود غير صحيح أو منتهي
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: الحساب غير موجود أو غير قابل للاستعادة
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: انتهت فترة السماح
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoneError'

  /auth/refresh:
    post:
      summary: تجديد Access Token
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      summary: تسجيل خروج (إبطال الجلسة الحالية)
      tags:
        - Authentication
      responses:
        '204':
          description: Logged out successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      summary: بياناتي
      tags:
        - Users
      responses:
        '200':
          description: User profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    patch:
      summary: تحديث بياناتي
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      summary: حذف حسابي
      tags:
        - Users
      responses:
        '204':
          description: Deleted successfully

  # ==========================================
  # 2️⃣ BOOKING SERVICE
  # ==========================================
  /bookings:
    get:
      summary: حجوزاتي (مع Pagination)
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
    post:
      summary: إنشاء حجز جديد
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machineId, startTime, durationHours]
              properties:
                machineId:
                  type: string
                startTime:
                  type: string
                  format: date-time
                durationHours:
                  type: integer
                  minimum: 1
                  maximum: 24
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /bookings/{id}:
    get:
      summary: تفاصيل حجز
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Booking not found

  /bookings/{id}/cancel:
    patch:
      summary: إلغاء حجز
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  # ==========================================
  # 3️⃣ MACHINE SERVICE
  # ==========================================
  /machines:
    get:
      summary: قائمة الأجهزة المتاحة للعامة
      tags:
        - Machines
      responses:
        '200':
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Machine'
    post:
      summary: تسجيل جهاز جديد (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, specs]
              properties:
                name:
                  type: string
                specs:
                  type: object
      responses:
        '201':
          description: Machine registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'

  /machines/{id}:
    get:
      summary: تفاصيل جهاز
      tags:
        - Machines
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Machine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '404':
          description: Machine not found
    patch:
      summary: تحديث جهاز (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Machine updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
    delete:
      summary: حذف جهاز (المالك/المسؤول)
      tags:
        - Machines (Owner/Admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Machine deleted
