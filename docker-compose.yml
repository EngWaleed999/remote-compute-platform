version: '3.8'

services:
  # خدمة قاعدة البيانات
  postgres:
    image: postgres:16-alpine
    container_name: my_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: walid-999
      POSTGRES_DB: user_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  # خدمة الـ Redis لإدارة الجلسات والـ Tokens بسرعة عالية
  redis:
    image: redis:latest
    container_name: my_redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# حجز مساحة تخزين دخرية في جهازك لكي لا تضيع البيانات عند إيقاف الحاويات
volumes:
  postgres_data:
  redis_data: